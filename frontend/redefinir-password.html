<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Palavra-passe - Sense Barbearia</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-page-container">
        <img src="assets/logo.png" alt="Sense Barbearia" class="auth-page-logo">
        <div class="auth-page-card">
            <h2><i class="fas fa-key"></i> Nova Palavra-passe</h2>
            <p class="auth-subtitle">Defina a sua nova palavra-passe.</p>
            <form id="formRedefinir">
                <div class="form-group">
                    <label for="novaPassword">Nova palavra-passe</label>
                    <input type="password" id="novaPassword" required minlength="6" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmar palavra-passe</label>
                    <input type="password" id="confirmPassword" required minlength="6" placeholder="Repita a palavra-passe">
                </div>
                <button type="submit" class="auth-submit-btn">Redefinir Palavra-passe</button>
            </form>
            <div class="auth-message hidden" id="msg"></div>
        </div>
        <a href="index.html" class="auth-page-link"><i class="fas fa-arrow-left"></i> Voltar ao site</a>
    </div>
    <script>
        const API_URL = 'http://localhost:3000/api';
        const token = new URLSearchParams(window.location.search).get('token');
        const msg = document.getElementById('msg');

        if (!token) {
            msg.textContent = 'Link de recuperação inválido.';
            msg.className = 'auth-message error';
            msg.classList.remove('hidden');
            document.getElementById('formRedefinir').style.display = 'none';
        }

        document.getElementById('formRedefinir').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('novaPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                msg.textContent = 'As palavras-passe não coincidem.';
                msg.className = 'auth-message error';
                msg.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/redefinir-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();

                msg.textContent = res.ok ? data.mensagem : (data.erro || 'Erro ao redefinir.');
                msg.className = `auth-message ${res.ok ? 'success' : 'error'}`;
                msg.classList.remove('hidden');

                if (res.ok) {
                    setTimeout(() => { window.location.href = 'index.html'; }, 2500);
                }
            } catch {
                msg.textContent = 'Erro de ligação ao servidor.';
                msg.className = 'auth-message error';
                msg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
