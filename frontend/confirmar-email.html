<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Email - Sense Barbershop</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-page-container">
        <img src="assets/logo.svg" alt="Sense Barbershop" class="auth-page-logo">
        <div class="auth-page-card" id="resultado">
            <div class="auth-loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>A confirmar o seu email...</p>
            </div>
        </div>
        <a href="conta.html" class="auth-page-link"><i class="fas fa-arrow-left"></i> Ir para login</a>
    </div>
    <script src="js/config.js"></script>
    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        const resultado = document.getElementById('resultado');

        async function confirmar() {
            if (!token) {
                resultado.innerHTML = `
                    <div class="auth-result error">
                        <i class="fas fa-times-circle"></i>
                        <h2>Link inválido</h2>
                        <p>O link de confirmação não é válido. Use o código em <a href="ativar-conta.html">ativar-conta.html</a>.</p>
                    </div>`;
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/confirmar-email?token=${token}`);
                const data = await res.json();

                if (res.ok) {
                    if (data.token && data.utilizador) {
                        localStorage.setItem('authToken', data.token);
                        localStorage.setItem('utilizador', JSON.stringify(data.utilizador));
                    }
                    resultado.innerHTML = `
                        <div class="auth-result success">
                            <i class="fas fa-check-circle"></i>
                            <h2>Conta ativada!</h2>
                            <p>${data.mensagem}</p>
                            <a href="finalizar.html" class="cta-button">Continuar</a>
                        </div>`;
                } else {
                    resultado.innerHTML = `
                        <div class="auth-result error">
                            <i class="fas fa-times-circle"></i>
                            <h2>Erro na confirmação</h2>
                            <p>${data.erro}</p>
                            <a href="ativar-conta.html" class="cta-button" style="margin-top:1rem;display:inline-block;">Ativar com código</a>
                        </div>`;
                }
            } catch {
                resultado.innerHTML = `
                    <div class="auth-result error">
                        <i class="fas fa-wifi"></i>
                        <h2>Sem ligação</h2>
                        <p>Não foi possível contactar o servidor. Verifique se o backend está a correr.</p>
                    </div>`;
            }
        }

        confirmar();
    </script>
</body>
</html>
